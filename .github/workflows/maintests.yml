name: horde_model_reference Main Tests

on:
  push:
    branches:
      - main
    paths:
      - '**.py'
      - '**.md'
      - '**.json'
      - '.github/workflows/maintests.yml'
      - '.github/workflows/prtests.yml'
      - '.github/workflows/release.yml'
      - 'uv.lock'
      - 'pyproject.toml'
jobs:
  no_extra_fields:
    env:
      AIWORKER_CACHE_HOME: ${{ github.workspace }}/.cache
      TESTS_ONGOING: "1"
      AI_HORDE_TESTING: "1"
      HORDELIB_CI_ONGOING: "1"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.12"
          - "3.13"

    steps:
      - uses: actions/checkout@v6
      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Check that no extra fields are present
        run: uv run pytest -k "test_scripts" # Enabled by HORDELIB_CI_ONGOING

  query_fields_drift:
    env:
      AIWORKER_CACHE_HOME: ${{ github.workspace }}/.cache
      TESTS_ONGOING: "1"
      AI_HORDE_TESTING: "1"
      HORDELIB_CI_ONGOING: "1"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.12"
          - "3.13"

    steps:
      - uses: actions/checkout@v6
      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Check that query fields have not drifted
        run: uv run python scripts/verify_query_fields.py


  build:
    env:
      AIWORKER_CACHE_HOME: ${{ github.workspace }}/.cache
      TESTS_ONGOING: "1"
      AI_HORDE_TESTING: "1"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.12"
          - "3.13"

    steps:
      - uses: actions/checkout@v6
      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install the project
        run: uv sync --locked --all-extras --dev


      - name: Run tests
        run: uv run pytest tests -m "not integration"
