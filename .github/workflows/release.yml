name: horde_model_reference build and publish

on:
  push:
    tags: ['v*']

jobs:
  build-n-publish:
    name: horde_model_reference build and publish
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/horde-model-reference/

    permissions:
      id-token: write # mandatory for PyPI trusted publishing
      contents: write # needed for GitHub Release creation

    steps:
      - name: "✔️ Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # setuptools_scm needs full history to derive version from tag

      - name: "🐍 Set up Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "🛠 Install pypa/build"
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: "🔧 Build a binary wheel and a source tarball"
        run: python -m build --sdist --wheel --outdir dist/ .

      - name: "📦 Publish distribution to PyPI"
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: "📣 Create GitHub Release"
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
